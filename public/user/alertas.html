<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechPix | Alertas</title>
    <link rel="stylesheet" href="../css/alertas.css">
    <link rel="icon" type="image/png" href="../assets/icon/logo.png" sizes="16x16">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/alertas.js"></script>
    <script src="../js/alert.js"></script>
</head>
<body onload="carregarAlertas()">
    <nav class="nav-lateral">
        <div class="nav-logo-user">
            <img src="../uploads/yuri.png" alt="">
        </div>
        <div class="nav-texto">
            <h1>Olá, <span id=""></span>Yuri</h1>
        </div>
        <div class="nav-botoes">
            <a href="../user/dashboard.html" class="btn_nav">Servidores</a>
        </div>
        <div class="nav-botoes">
            <a href="../index.html" class="btn_nav">Suporte</a>
        </div>
        <div class="nav-botoes">
            <a id="atual" class="btn_nav">Alertas</a>
        </div>
        <div class="nav-botoes">
            <a href="../index.html" class="btn_nav" id="sair">Sair</a>
        </div>
           
    </nav>

    
    <div class="mainContainer">
        <div class="header">
            <h1>Alertas da Empresa</h1>
            <div class="filtros">
                <button class="filtroBtn active" onclick="filtrarPorPeriodo('HOUR', 1)">Última Hora</button>
                <button class="filtroBtn" onclick="filtrarPorPeriodo('DAY', 1)">Último Dia</button>
                <button class="filtroBtn" onclick="filtrarPorPeriodo('WEEK', 1)">Última Semana</button>
            </div>
        </div>
        <div class="alertasContainer">
            <table class="alertasTable">
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Máquina</th>
                        <th>Componente</th>
                        <th>Tipo</th>
                        <th>Descrição</th>
                        <th>Quadrante</th>
                    </tr>
                </thead>
                <tbody id="alertasTableBody">
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
